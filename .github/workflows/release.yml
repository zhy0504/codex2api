name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: |
          npm run build

      - name: Go test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail

          version="${VERSION#v}"
          mkdir -p dist build

          build_target() {
            local goos="$1"
            local goarch="$2"
            local archive_base="codex2api_${version}_${goos}_${goarch}"
            local workdir="build/${goos}_${goarch}"
            local binary_name="codex2api"

            rm -rf "$workdir"
            mkdir -p "$workdir"

            if [[ "$goos" == "windows" ]]; then
              binary_name="codex2api.exe"
            fi

            CGO_ENABLED=0 GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags="-s -w" -o "$workdir/$binary_name" .

            cp .env.example "$workdir/.env.example"
            cp README.md "$workdir/README.md"

            if [[ "$goos" == "windows" ]]; then
              (
                cd "$workdir"
                zip -r "../../dist/${archive_base}.zip" .
              )
            else
              tar -C "$workdir" -czf "dist/${archive_base}.tar.gz" .
            fi
          }

          build_target linux amd64
          build_target linux arm64
          build_target darwin amd64
          build_target darwin arm64
          build_target windows amd64

          (
            cd dist
            sha256sum * > SHA256SUMS.txt
          )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS.txt
